crawl:
  max_articles: 3
  timeout: 30
  concurrency: 3
output:
  dir: nodes
sites:
  - name: clashmeta
    start_url: https://clash-meta.github.io/free-nodes/
    description: "blog with subscription links"
    link_pattern: null
llm:
  providers:
    - name: openrouter
      base_url: https://openrouter.ai/api/v1
      api_key_env: OPENROUTER_API_KEY
      models: [openrouter/free]
      is_reasoning_model: false
      default_weight: 50
    - name: cerebras
      base_url: https://api.cerebras.ai/v1
      api_key_env: CEREBRAS_API_KEY
      models: [zai-glm-4.7, gpt-oss-120b]
      is_reasoning_model: true
      default_weight: 30
    - name: opencode
      base_url: https://opencode.ai/zen/v1
      api_key_env: OPENCODE_API_KEY
      models: [deepseek-v4-flash-free]
      is_reasoning_model: false
      default_weight: 20
  task_routing:
    extract_links:
      openrouter: 60
      cerebras: 30
      opencode: 10
    generate_pattern:
      openrouter: 70
      cerebras: 30
      opencode: 0
