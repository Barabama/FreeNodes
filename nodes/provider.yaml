allow-lan: true
dns:
  default-nameserver:
  - 223.5.5.5
  - 114.114.114.114
  enable: true
  listen: 0.0.0.0:53
  nameserver:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
ipv6: true
log-level: info
mixed-port: 7890
mode: rule
proxy-groups:
- include: (澳大利亚|AU|Australia|Sydney|SYD)
  interval: 300
  name: 🇦🇺 AU 澳大利亚
  type: url-test
  url: http://www.gstatic.com/generate_204
  use: &id001
